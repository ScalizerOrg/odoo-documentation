name: Sync Upstream Documentation (V2)

on:
  schedule:
    # Every Monday at 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      versions:
        description: "Comma-separated versions to sync (e.g. 17.0,18.0,19.0). Leave empty for all."
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        version: ["14.0", "15.0", "16.0", "17.0", "18.0", "19.0"]
    steps:
      - name: Check if version should be synced
        id: check
        run: |
          INPUT_VERSIONS="${{ github.event.inputs.versions }}"
          VERSION="${{ matrix.version }}"
          if [ -z "$INPUT_VERSIONS" ] || echo "$INPUT_VERSIONS" | grep -q "$VERSION"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if branch exists locally
        if: steps.check.outputs.skip != 'true'
        id: local-check
        run: |
          if git rev-parse --verify HEAD > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add upstream remote
        if: steps.check.outputs.skip != 'true' && steps.local-check.outputs.exists == 'true'
        run: |
          git remote add upstream https://github.com/odoo/documentation.git || true
          git fetch upstream ${{ matrix.version }} || echo "Branch ${{ matrix.version }} not found upstream"

      - name: Check if upstream branch exists
        if: steps.check.outputs.skip != 'true' && steps.local-check.outputs.exists == 'true'
        id: upstream-check
        run: |
          if git rev-parse --verify upstream/${{ matrix.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt merge
        if: steps.check.outputs.skip != 'true' && steps.local-check.outputs.exists == 'true' && steps.upstream-check.outputs.exists == 'true'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git merge upstream/${{ matrix.version }} --no-edit; then
            # Check if there are actual changes to push
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/${{ matrix.version }})" ]; then
              echo "status=success" >> "$GITHUB_OUTPUT"
              git push origin ${{ matrix.version }}
            else
              echo "status=no-changes" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Create issue on conflict
        if: steps.merge.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ matrix.version }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Upstream sync conflict on ${version}`,
              body: `The automatic sync from \`odoo/documentation:${version}\` failed due to merge conflicts.\n\n` +
                    `**Action required:** Manually resolve the conflicts and merge.\n\n` +
                    `\`\`\`bash\n` +
                    `git checkout ${version}\n` +
                    `git fetch upstream ${version}\n` +
                    `git merge upstream/${version}\n` +
                    `# Resolve conflicts, then:\n` +
                    `git push origin ${version}\n` +
                    `\`\`\`\n\n` +
                    `Triggered by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['sync-conflict']
            });

  # Trigger index rebuild if any sync succeeded
  trigger-rebuild:
    runs-on: ubuntu-latest
    needs: [sync]
    if: always() && needs.sync.result == 'success'
    steps:
      - name: Trigger index rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-index.yml',
              ref: 'main'
            });
