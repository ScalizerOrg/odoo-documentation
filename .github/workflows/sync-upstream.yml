name: Sync Upstream Documentation

on:
  schedule:
    # Every Monday at 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "19.0"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/odoo/documentation.git || true
          git fetch upstream 19.0

      - name: Attempt merge
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git merge upstream/19.0 --no-edit; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            git push origin 19.0
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Create issue on conflict
        if: steps.merge.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync conflict on 19.0',
              body: `The automatic sync from \`odoo/documentation:19.0\` failed due to merge conflicts.\n\n` +
                    `**Action required:** Manually resolve the conflicts and merge.\n\n` +
                    `\`\`\`bash\n` +
                    `git fetch upstream 19.0\n` +
                    `git merge upstream/19.0\n` +
                    `# Resolve conflicts, then:\n` +
                    `git push origin 19.0\n` +
                    `\`\`\`\n\n` +
                    `Triggered by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['sync-conflict']
            });

      - name: Trigger index rebuild
        if: steps.merge.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-index.yml',
              ref: '19.0'
            });
